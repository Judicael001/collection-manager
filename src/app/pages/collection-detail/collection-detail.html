<header id="collection-header">
    <h1>My Collection</h1>
    <div>
    <app-search-bar
        [(search)]="search"
    >
    </app-search-bar>
    </div>
</header>
<section class="collection-grid">
    @for (item of displayedItems(); track item.name) {
        @switch (item.rarity) {
            @case ('Legendary') {
                <div>
                    <app-collection-item-card [item]="item"></app-collection-item-card>
                    <hr class="gold">
                </div>
            }
            @case ('Rare') {
                <div>
                    <app-collection-item-card [item]="item"></app-collection-item-card>
                    <hr class="grey">
                </div>
            }
            @default {
                <app-collection-item-card [item]="item"></app-collection-item-card>
            }
        }
    }
</section>
@let displayedItemCount = displayedItems().length;
@if (displayedItemCount) {
    <div class="centered">{{displayedItemCount}} objet(s) affiché(s)</div>
} @else {
    <div class="centered">Aucun resultat.</div>
}
<div class="centered">
    <button matButton="filled" (click)="addItem()">Ajouter un objet</button>
</div>
